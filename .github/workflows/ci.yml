name: AegisGraph Sentinel 2.0 CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
        include:
          - python-version: "3.9"
            run_coverage: false
          - python-version: "3.10"
            run_coverage: true

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Automated caching for faster dependency downloads

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure all required runtime and testing libraries are present
        pip install fastapi uvicorn networkx numpy pyyaml python-dotenv httpx slowapi pytest pytest-asyncio pydantic flake8

    - name: Lint Codebase with Flake8 (Static Analysis)
      run: |
        # Stop the build if there are critical Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all other style warnings as non-blocking
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Forensic Core & Test Suite Verification
      env:
        AEGIS_API_KEY_HASHES: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        AEGIS_GRAPH_SHA256: "dummy_hash_for_headless_ci_runner_nodes"
        RUN_COVERAGE: ${{ matrix.run_coverage }}
      run: |
        # Run full suite with optional coverage (only enabled on one matrix leg).
        if [ "${RUN_COVERAGE:-false}" = "true" ]; then
          python -m pytest tests/ --cov=src --cov-report=term-missing
        else
          python -m pytest tests/
        fi

    - name: Verify API Entry Point Compilation Surface
      env:
        AEGIS_API_KEY_HASHES: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        AEGIS_GRAPH_SHA256: "dummy_hash_for_headless_ci_runner_nodes"
      run: |
        # Ensure the main route entry definitions can compile flawlessly in production
        python -m py_compile src/api/main.py