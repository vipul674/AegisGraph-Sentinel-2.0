{{/* AegisGraph Sentinel API Service Template */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegisgraph.fullname" . }}-api
  labels:
    {{- include "aegisgraph.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
  - name: grpc
    port: {{ .Values.service.grpcPort }}
    targetPort: grpc
    protocol: TCP
  selector:
    {{- include "aegisgraph.selectorLabels" . | nindent 4 }}
    component: api