name: "PR Dynamic Code Verifier"

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
  
jobs:
  verify-changes:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so we can diff files accurately

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov mock

      - name: Extract Context and Test Universally
        id: universal_tester
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const match = prBody.match(/Fixes\s*#\s*(\d+)/i);
            
            let issueLabels = [];
            if (match) {
              const issueNumber = match[1];
              core.info(`Linked Issue Found: #${issueNumber}`);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber, 10)
                });
                issueLabels = issue.data.labels.map(l => l.name.toLowerCase());
                core.info(`Fetched Issue Labels: ${issueLabels.join(', ')}`);
              } catch (e) {
                core.info(`Could not fetch issue details: ${e.message}. Proceeding with changed files analysis.`);
              }
            } else {
              core.info("No linked issue found in PR description. Relying entirely on file diff analysis.");
            }
            
            // Export data to environment variables for Python execution
            core.exportVariable('PR_LABELS', issueLabels.join(','));
            core.exportVariable('BASE_REF', context.payload.pull_request.base.ref);

      - name: Smart Test Discovery & Execution
        run: |
          import os, sys, subprocess
          
          labels = os.getenv('PR_LABELS', '').split(',')
          base_ref = os.getenv('BASE_REF', 'master')
          
          print(f"Analyzing modified files against base branch: origin/{base_ref}")
          
          # 1. Universally discover what files the developer actually changed in this PR
          try:
              diff_cmd = ["git", "diff", f"origin/{base_ref}...HEAD", "--name-only"]
              changed_files = subprocess.check_output(diff_cmd).decode('utf-8').splitlines()
          except Exception as e:
              print(f"Warning: Falling back to local diff check due to history constraint: {e}")
              changed_files = subprocess.check_output(["git", "diff", "--name-only", "HEAD~1"]).decode('utf-8').splitlines()
          
          print(f"Detected changed files: {changed_files}")
          
          # 2. Extract unique directories that are being targeted/modified
          impacted_dirs = set()
          for f in changed_files:
              if f.endswith('.py') and '/' in f:
                  # E.g., extracts 'src/inference' from 'src/inference/scorer.py'
                  parent_dir = os.path.dirname(f)
                  impacted_dirs.add(os.path.basename(parent_dir))
          
          print(f"Impacted structural component keywords: {list(impacted_dirs)}")
          
          # 3. Universal Test Search Engine
          matched_test_files = []
          
          # Look through your entire test/ or tests/ folder universally
          test_root = "tests" if os.path.exists("tests") else "test" if os.path.exists("test") else None
          
          if test_root:
              for root, _, files in os.walk(test_root):
                  for file in files:
                      if file.startswith("test_") and file.endswith(".py"):
                          file_lower = file.lower()
                          file_path = os.path.join(root, file)
                          
                          # Match Strategy A: Does test file name match a directory altered (e.g. test_inference.py)?
                          dir_match = any(d in file_lower for d in impacted_dirs if d)
                          
                          # Match Strategy B: Does test file name match an issue label keyword (e.g. test_performance.py)?
                          label_match = any(l.replace('type:', '') in file_lower for l in labels if l)
                          
                          if dir_match or label_match:
                              if file_path not in matched_test_files:
                                  matched_test_files.append(file_path)
          
          # 4. Running the selection
          if matched_test_files:
              print(f"🎯 Universally discovered relevant test targets: {matched_test_files}")
              test_execution_command = ["pytest"] + matched_test_files + ["-v"]
          else:
              print("📦 No specific test files matched the changed source files. Skipping — narrow change without applicable tests.")
              sys.exit(0)
              
          print(f"Running: {' '.join(test_execution_command)}")
          execution_result = subprocess.run(test_execution_command)
          
          if execution_result.returncode != 0:
              print("❌ Dynamic verification testing returned failure validation bounds.")
              sys.exit(1)
              
          print("✅ Universal checks cleared successfully!")
        shell: python